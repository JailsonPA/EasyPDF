name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write  # required by SignPath

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install vpk
        run: dotnet tool install -g vpk

      - name: Extract version from tag
        id: ver
        run: echo "VERSION=$($env:GITHUB_REF_NAME.TrimStart('v'))" >> $env:GITHUB_OUTPUT

      - name: Publish
        run: dotnet publish src/EasyPDF.UI -c Release -r win-x64 --self-contained -o publish/

      - name: Pack (Velopack)
        run: vpk pack --packId EasyPDF --packVersion ${{ steps.ver.outputs.VERSION }} --packDir publish/ --outputDir releases/

      - name: Upload unsigned artifacts
        uses: actions/upload-artifact@v4
        with:
          name: setup-unsigned
          path: releases/

      - name: Sign Setup (SignPath)
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORG_ID }}
          project-slug: easypdf
          signing-policy-slug: release-signing
          artifact-configuration-slug: windows-installer
          github-artifact-id: setup-unsigned
          wait-for-completion: true
          output-artifact-directory: releases-signed/
        continue-on-error: true  # se SignPath falhar, publica na mesma sem assinatura

      - name: Use signed artifacts if available
        id: pick-artifacts
        run: |
          if (Test-Path "releases-signed") {
            echo "ARTIFACTS_DIR=releases-signed" >> $env:GITHUB_OUTPUT
          } else {
            echo "ARTIFACTS_DIR=releases" >> $env:GITHUB_OUTPUT
          }

      - name: Create GitHub Release
        run: gh release create ${{ github.ref_name }} "${{ steps.pick-artifacts.outputs.ARTIFACTS_DIR }}/*" --title "EasyPDF ${{ steps.ver.outputs.VERSION }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
